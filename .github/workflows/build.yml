name: Build iOS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  issues: write
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cat > project.yml << 'YMLEOF'
          name: BankGridApp
          options:
            bundleIdPrefix: com.dorian
            deploymentTarget:
              iOS: "16.0"
            generateEmptyDirectories: true
          settings:
            base:
              SWIFT_VERSION: "5.0"
          targets:
            BankGridApp:
              type: application
              platform: iOS
              sources:
                - BankGridApp
              settings:
                base:
                  INFOPLIST_FILE: BankGridApp/Info.plist
                  PRODUCT_BUNDLE_IDENTIFIER: com.dorian.BankGridApp
                  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
                  GENERATE_INFOPLIST_FILE: NO
                  TARGETED_DEVICE_FAMILY: "1,2"
                  IPHONEOS_DEPLOYMENT_TARGET: "16.0"
                  CODE_SIGN_IDENTITY: ""
                  CODE_SIGNING_REQUIRED: NO
                  CODE_SIGNING_ALLOWED: NO
                  DEVELOPMENT_TEAM: ""
                  ENABLE_USER_SCRIPT_SANDBOXING: NO
          YMLEOF
          xcodegen generate
          echo "Generated project files:"
          ls -la BankGridApp.xcodeproj/
          echo "Available schemes:"
          xcodebuild -project BankGridApp.xcodeproj -list 2>&1 || true
          echo "Available targets:"
          xcodebuild -project BankGridApp.xcodeproj -target BankGridApp -showBuildSettings 2>&1 | head -5 || true

      - name: Build Project
        run: |
          set -o pipefail
          xcodebuild build \
            -project BankGridApp.xcodeproj \
            -target BankGridApp \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

      - name: Output build log on failure
        if: failure()
        run: |
          echo "=== BUILD FAILED ==="
          echo "Last 150 lines of build log:"
          tail -150 build.log || true
          echo "=== Error lines ==="
          grep -i "error:" build.log || true

      - name: Post build log to issue on failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f build.log ]; then
            LOG_CONTENT=$(tail -200 build.log | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/issues/1/comments \
              -d "{\"body\": \"Build log (run #${{ github.run_number }}):\n\n\`\`\`\n${LOG_CONTENT}\n\`\`\`\"}" || true
          fi

      - name: Create IPA
        run: |
          echo "Searching for .app in DerivedData..."
          find build/DerivedData -name "*.app" -type d 2>/dev/null || true
          APP_PATH=$(find build/DerivedData -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            exit 1
          fi
          echo "Found: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr BankGridApp.ipa Payload
          ls -la BankGridApp.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BankGridApp.ipa
          path: BankGridApp.ipa

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: BankGridApp.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
