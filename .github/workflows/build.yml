name: Build iOS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen generate 2>&1
          echo ""
          echo "=== objectVersion check ==="
          grep "objectVersion" BankGridApp.xcodeproj/project.pbxproj || echo "No objectVersion found"
          echo ""
          echo "=== Scheme list ==="
          xcodebuild -project BankGridApp.xcodeproj -list 2>&1 || true

      - name: Build Project
        run: |
          set -o pipefail
          xcodebuild build \
            -project BankGridApp.xcodeproj \
            -target BankGridApp \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

      - name: Output build log on failure
        if: failure()
        run: |
          echo "=== Error lines ==="
          grep -E "error:|warning:" build.log 2>/dev/null || echo "No error lines found"
          echo ""
          echo "=== Last 200 lines of build log ==="
          tail -200 build.log 2>/dev/null || echo "No build log"
          {
            echo "## Build Log (errors and warnings)"
            echo '```'
            grep -E "error:|warning:" build.log 2>/dev/null || echo "No errors found"
            echo '```'
            echo ""
            echo "## Last 200 lines of build log"
            echo '```'
            tail -200 build.log 2>/dev/null || echo "No build log"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Post build errors to GitHub issue
        if: failure()
        run: |
          ERROR_LOG=$(grep -E "error:" build.log 2>/dev/null | head -50 || echo "No errors found")
          LAST_LINES=$(tail -50 build.log 2>/dev/null || echo "No build log")
          ISSUE_BODY="## Build Failure - Run #${{ github.run_number }}

          **Commit:** ${{ github.sha }}
          **Date:** $(date -u)

          ### Error Lines
          \`\`\`
          ${ERROR_LOG}
          \`\`\`

          ### Last 50 lines
          \`\`\`
          ${LAST_LINES}
          \`\`\`"
          gh issue create \
            --title "Build Failure #${{ github.run_number }}" \
            --body "$ISSUE_BODY" 2>&1 || echo "Failed to create issue"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create IPA
        run: |
          APP_PATH=$(find . -name "*.app" -path "*/Build/*" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d | grep -v "Payload" | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            find . -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr BankGridApp.ipa Payload
          ls -la BankGridApp.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BankGridApp.ipa
          path: BankGridApp.ipa

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: BankGridApp.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
