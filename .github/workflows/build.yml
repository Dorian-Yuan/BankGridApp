name: Build iOS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - Diagnose xcodebuild issue
        run: |
          echo "=== Xcode version ==="
          xcodebuild -version
          echo ""
          echo "=== xcode-select ==="
          xcode-select -p
          echo ""
          echo "=== Project Structure ==="
          find . -maxdepth 4 -not -path './.git/*' | head -80
          echo ""
          echo "=== xcodebuild -list ==="
          xcodebuild -project BankGridApp.xcodeproj -list 2>&1 || true
          echo ""
          echo "=== xcodebuild -showBuildSettings (first 50 lines) ==="
          xcodebuild -project BankGridApp.xcodeproj -scheme BankGridApp -showBuildSettings 2>&1 | head -50 || true
          echo ""
          echo "=== Scheme file ==="
          cat BankGridApp.xcodeproj/xcshareddata/xcschemes/BankGridApp.xcscheme 2>/dev/null || echo "No scheme file found"
          echo ""
          echo "=== Workspace ==="
          ls -laR BankGridApp.xcodeproj/project.xcworkspace/ 2>/dev/null || echo "No workspace dir"
          echo ""
          echo "=== pbxproj file size ==="
          wc -l BankGridApp.xcodeproj/project.pbxproj
          echo ""
          echo "=== Try building with -target instead ==="
          xcodebuild build -project BankGridApp.xcodeproj -target BankGridApp -destination 'generic/platform=iOS' -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO 2>&1 | head -30 || true

      - name: Build with xcodebuild
        run: |
          set -o pipefail
          xcodebuild build \
            -project BankGridApp.xcodeproj \
            -scheme BankGridApp \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Create IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "BankGridApp.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: BankGridApp.app not found"
            find build/DerivedData -maxdepth 5 -type d 2>/dev/null || true
            exit 1
          fi
          echo "Found: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr BankGridApp.ipa Payload
          ls -la BankGridApp.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BankGridApp.ipa
          path: BankGridApp.ipa

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: BankGridApp.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
