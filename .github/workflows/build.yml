name: Build iOS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Debug Info
        run: |
          xcodebuild -version
          echo "--- Project list ---"
          xcodebuild -project BankGridApp.xcodeproj -list 2>&1 || true
          echo "--- Scheme files ---"
          find BankGridApp.xcodeproj -name "*.xcscheme" 2>/dev/null || true
          echo "--- PbxProj check ---"
          head -5 BankGridApp.xcodeproj/project.pbxproj

      - name: Build
        run: |
          xcodebuild build \
            -project BankGridApp.xcodeproj \
            -target BankGridApp \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            2>&1 | tee build.log || true
          echo "--- Build exit code: $? ---"
          echo "--- Find .app ---"
          find build/DerivedData -name "*.app" 2>/dev/null || true
          echo "--- Find any errors in log ---"
          grep -i "error:" build.log | head -30 || true

      - name: Create IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "BankGridApp.app" -path "*iphoneos*" | head -1)
          echo "Found app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: BankGridApp.app not found in expected location"
            find build/DerivedData -name "*.app" 2>/dev/null || true
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr BankGridApp.ipa Payload
          ls -la BankGridApp.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BankGridApp.ipa
          path: BankGridApp.ipa

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: BankGridApp.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
