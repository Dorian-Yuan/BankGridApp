name: Build iOS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          xcodebuild -version
          xcode-select -p
          ls -la BankGridApp.xcodeproj/
          ls -la BankGridApp.xcodeproj/xcshareddata/xcschemes/ 2>/dev/null || echo "No shared schemes found"

      - name: List Xcode Project Info
        run: |
          xcodebuild -project BankGridApp.xcodeproj -list 2>&1 || true

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project BankGridApp.xcodeproj \
            -scheme BankGridApp \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            2>&1 | tee build.log

      - name: Create IPA
        run: |
          echo "Searching for BankGridApp.app..."
          find build/DerivedData -name "*.app" -type d 2>/dev/null || true
          APP_PATH=$(find build/DerivedData -name "BankGridApp.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: BankGridApp.app not found"
            echo "Listing DerivedData contents..."
            find build/DerivedData -maxdepth 5 -type d 2>/dev/null || true
            exit 1
          fi
          echo "Found: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr BankGridApp.ipa Payload
          ls -la BankGridApp.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BankGridApp.ipa
          path: BankGridApp.ipa

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: BankGridApp.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
