name: Build iOS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        id: xcodegen
        run: |
          XCODEGEN_OUTPUT=$(xcodegen generate 2>&1)
          echo "XCODEGEN_OUTPUT<<EOF" >> "$GITHUB_ENV"
          echo "$XCODEGEN_OUTPUT" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
          
          PROJECT_FILES=$(find BankGridApp.xcodeproj -type f 2>/dev/null || echo "No project found")
          echo "PROJECT_FILES<<EOF" >> "$GITHUB_ENV"
          echo "$PROJECT_FILES" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
          
          SCHEME_FILES=$(find BankGridApp.xcodeproj -name "*.xcscheme" 2>/dev/null || echo "No scheme files found")
          echo "SCHEME_FILES<<EOF" >> "$GITHUB_ENV"
          echo "$SCHEME_FILES" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
          
          LIST_OUTPUT=$(xcodebuild -project BankGridApp.xcodeproj -list 2>&1 || true)
          echo "LIST_OUTPUT<<EOF" >> "$GITHUB_ENV"
          echo "$LIST_OUTPUT" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Post debug info to issue
        if: always()
        run: |
          DEBUG_BODY="## Run #${{ github.run_number }}
          
          **XcodeGen Output:**
          \`\`\`
          ${XCODEGEN_OUTPUT}
          \`\`\`
          
          **Project Files:**
          \`\`\`
          ${PROJECT_FILES}
          \`\`\`
          
          **Scheme Files:**
          \`\`\`
          ${SCHEME_FILES}
          \`\`\`
          
          **Target/Scheme List:**
          \`\`\`
          ${LIST_OUTPUT}
          \`\`\`"
          
          gh issue comment 2 --body "$DEBUG_BODY" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Project
        run: |
          set -o pipefail
          xcodebuild build \
            -project BankGridApp.xcodeproj \
            -scheme BankGridApp \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

      - name: Output build log on failure
        if: failure()
        run: |
          BUILD_LOG=$(tail -200 build.log 2>/dev/null || echo "No build log found")
          ERROR_LINES=$(grep -i "error:" build.log 2>/dev/null || echo "No error lines found")
          
          BODY="## Build Failed - Run #${{ github.run_number }}
          
          **Error Lines:**
          \`\`\`
          ${ERROR_LINES}
          \`\`\`
          
          **Build Log (last 200 lines):**
          \`\`\`
          ${BUILD_LOG}
          \`\`\`"
          
          gh issue comment 2 --body "$BODY" || true

      - name: Create IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr BankGridApp.ipa Payload
          ls -la BankGridApp.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BankGridApp.ipa
          path: BankGridApp.ipa

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: BankGridApp.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
