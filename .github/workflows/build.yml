name: Build iOS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen generate 2>&1
          echo ""
          echo "=== objectVersion check ==="
          grep "objectVersion" BankGridApp.xcodeproj/project.pbxproj || echo "No objectVersion found"
          echo ""
          echo "=== Scheme list ==="
          xcodebuild -project BankGridApp.xcodeproj -list 2>&1 || true

      - name: Build Project
        run: |
          set -o pipefail
          xcodebuild build \
            -project BankGridApp.xcodeproj \
            -scheme BankGridApp \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

      - name: Output build log on failure
        if: failure()
        run: |
          echo "=== Error lines ==="
          grep -E "error:|warning:" build.log 2>/dev/null || echo "No error lines found"
          {
            echo "## Build Log (errors and warnings)"
            echo '```'
            grep -E "error:|warning:" build.log 2>/dev/null || echo "No errors found"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr BankGridApp.ipa Payload
          ls -la BankGridApp.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BankGridApp.ipa
          path: BankGridApp.ipa

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: BankGridApp.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
