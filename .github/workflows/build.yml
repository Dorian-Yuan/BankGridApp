name: Build iOS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cat > project.yml << 'EOF'
          name: BankGridApp
          options:
            bundleIdPrefix: com.dorian
            deploymentTarget:
              iOS: "16.0"
            xcodeVersion: "15.4"
            generateEmptyDirectories: true
          settings:
            base:
              SWIFT_VERSION: "5.0"
              CODE_SIGN_IDENTITY: ""
              CODE_SIGNING_REQUIRED: NO
              CODE_SIGNING_ALLOWED: NO
              DEVELOPMENT_TEAM: ""
              ENABLE_USER_SCRIPT_SANDBOXING: NO
          targets:
            BankGridApp:
              type: application
              platform: iOS
              sources:
                - BankGridApp
              settings:
                base:
                  INFOPLIST_FILE: BankGridApp/Info.plist
                  PRODUCT_BUNDLE_IDENTIFIER: com.dorian.BankGridApp
                  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
                  GENERATE_INFOPLIST_FILE: NO
                  TARGETED_DEVICE_FAMILY: "1,2"
                  IPHONEOS_DEPLOYMENT_TARGET: "16.0"
              entitlements:
                path: BankGridApp/BankGridApp.entitlements
                properties:
                  com.apple.security.app-sandbox: false
          EOF
          xcodegen generate

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project BankGridApp.xcodeproj \
            -scheme BankGridApp \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Create IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "BankGridApp.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: BankGridApp.app not found"
            find build/DerivedData -maxdepth 5 -type d 2>/dev/null || true
            exit 1
          fi
          echo "Found: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr BankGridApp.ipa Payload
          ls -la BankGridApp.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BankGridApp.ipa
          path: BankGridApp.ipa

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: BankGridApp.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
