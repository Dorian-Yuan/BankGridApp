name: Build iOS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Show Xcode Info
        run: |
          xcodebuild -version
          xcodebuild -project BankGridApp.xcodeproj -list 2>&1 || true
          ls -la BankGridApp.xcodeproj/

      - name: Build
        run: |
          xcodebuild build \
            -project BankGridApp.xcodeproj \
            -scheme BankGridApp \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            WARNING_CFLAGS="-w" \
            2>&1 | tee build.log

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r DerivedData/Build/Products/Release-iphoneos/BankGridApp.app Payload/
          zip -r BankGridApp.ipa Payload
          ls -la BankGridApp.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BankGridApp.ipa
          path: BankGridApp.ipa

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: BankGridApp.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
