name: Build iOS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cat > project.yml << 'YMLEOF'
          name: BankGridApp
          options:
            bundleIdPrefix: com.dorian
            deploymentTarget:
              iOS: "16.0"
            generateEmptyDirectories: true
          settings:
            base:
              SWIFT_VERSION: "5.0"
          targets:
            BankGridApp:
              type: application
              platform: iOS
              sources:
                - BankGridApp
              settings:
                base:
                  INFOPLIST_FILE: BankGridApp/Info.plist
                  PRODUCT_BUNDLE_IDENTIFIER: com.dorian.BankGridApp
                  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
                  GENERATE_INFOPLIST_FILE: NO
                  TARGETED_DEVICE_FAMILY: "1,2"
                  IPHONEOS_DEPLOYMENT_TARGET: "16.0"
                  CODE_SIGN_IDENTITY: ""
                  CODE_SIGNING_REQUIRED: NO
                  CODE_SIGNING_ALLOWED: NO
                  DEVELOPMENT_TEAM: ""
                  ENABLE_USER_SCRIPT_SANDBOXING: NO
          YMLEOF
          xcodegen generate

      - name: Archive Project
        run: |
          xcodebuild archive \
            -project BankGridApp.xcodeproj \
            -scheme BankGridApp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/BankGridApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log

      - name: Post build log to issue on failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f build.log ]; then
            LOG_CONTENT=$(head -300 build.log | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/issues/1/comments \
              -d "{\"body\": \"Build log (run #${{ github.run_number }}):\n\n\`\`\`\n${LOG_CONTENT}\n\`\`\`\"}" || true
          fi

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/BankGridApp.xcarchive/Products/Applications/BankGridApp.app Payload/
          zip -qr BankGridApp.ipa Payload
          ls -la BankGridApp.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BankGridApp.ipa
          path: BankGridApp.ipa

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: BankGridApp.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
