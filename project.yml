name: BankGridApp
options:
  bundleIdPrefix: com.dorian
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  BankGridApp:
    type: application
    platform: iOS
    sources:
      - BankGridApp
    settings:
      base:
        INFOPLIST_FILE: BankGridApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.dorian.BankGridApp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
        ENABLE_USER_SCRIPT_SANDBOXING: NO
schemes:
  BankGridApp:
    build:
      targets:
        BankGridApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
